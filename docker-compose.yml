services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: firmflow-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: postgres
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: firmflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: firmflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: UTC
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d firmflow"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres_data:
